name: CI / Run Checks

on:
  push:
    branches: [main, master]

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Run Linters
        run: |
          uv run ruff check
          uv run ruff format --check
          uv run mypy .
          uv run flake8 src
          uv run ty check
